<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长截图采集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 标题 -->
    <div class="header">
      <span class="header-icon">📚</span>
      <h1>长截图采集</h1>
    </div>

    <!-- 模式选择 -->
    <div class="section">
      <div class="section-title">采集模式</div>
      <div class="mode-switch">
        <button id="modeSingle" class="mode-btn active">单章截图</button>
        <button id="modeMulti" class="mode-btn">多章采集</button>
      </div>
    </div>

    <!-- 多章模式设置 -->
    <div id="multiSettings" class="section hidden">
      <div class="control-group">
        <label>小说名称</label>
        <div id="novelNameDisplay" class="novel-name-display">（开始后将自动识别）</div>
      </div>

      <div class="radio-group">
        <label class="radio-item">
          <input type="radio" name="collectMode" value="10" checked>
          <span class="radio-label">前10章</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="collectMode" value="30">
          <span class="radio-label">前30章</span>
        </label>
        <label class="radio-item radio-item-wide">
          <input type="radio" name="collectMode" value="all">
          <span class="radio-label">全部章节</span>
        </label>
      </div>

      <div class="control-group">
        <label for="customCount">自定义章节数（选填）</label>
        <input type="number" id="customCount" value="" min="1" max="9999" placeholder="留空则按上方选择">
      </div>

      <div class="control-group">
        <label for="chapterDelay">章节间隔 (ms)</label>
        <input type="number" id="chapterDelay" value="1500" min="500" max="10000" step="100">
        <div class="hint">翻页后等待页面加载的时间</div>
      </div>
    </div>

    <!-- 单章模式设置 -->
    <div id="singleSettings" class="section">
      <div class="control-group">
        <label for="scrollDelay">滚动延迟 (ms)</label>
        <input type="number" id="scrollDelay" value="800" min="100" max="5000" step="100">
      </div>
    </div>

    <!-- 页面信息（测高后显示）-->
    <div id="pageInfo" class="page-info hidden">
      <div class="info-row">
        <span class="info-label">页面高度:</span>
        <span id="infoHeight">--</span>
        <span class="info-unit">px</span>
      </div>
      <div class="info-row">
        <span class="info-label">预计帧数:</span>
        <span id="infoFrames">--</span>
        <span class="info-unit">帧</span>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="button-group">
      <button id="startBtn" class="btn btn-primary btn-large">开始采集</button>
      <button id="stopBtn" class="btn btn-stop btn-large" disabled>停止</button>
    </div>

    <!-- 状态区域 -->
    <div class="status">
      <div id="statusText" class="status-text">就绪</div>

      <!-- 多章进度 -->
      <div id="chapterInfo" class="chapter-info hidden">
        正在采集: 第 <strong id="currentChapter">1</strong> / <strong id="totalChapters">1</strong> 章
        <div class="chapter-bar">
          <div id="chapterFill" class="chapter-fill"></div>
        </div>
      </div>

      <!-- 单章进度 -->
      <div id="frameInfo">
        <div id="frameCount">已捕获: 0 帧</div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <!-- 完成日志 -->
      <div id="logArea" class="log-area hidden"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
