<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长截图工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>长截图工具</h1>

    <div class="control-group">
      <label for="scrollDelay">滚动延迟 (ms)</label>
      <input type="number" id="scrollDelay" value="800" min="100" max="5000" step="100">
    </div>

    <!-- 自动测高显示区域 -->
    <div id="pageInfo" class="page-info hidden">
      <div class="info-row">
        <span class="info-label">页面高度:</span>
        <span id="infoHeight">--</span>
        <span class="info-unit">px</span>
      </div>
      <div class="info-row">
        <span class="info-label">预计帧数:</span>
        <span id="infoFrames">--</span>
        <span class="info-unit">帧</span>
      </div>
    </div>

    <div class="button-group">
      <button id="startBtn" class="btn btn-primary">开始截图</button>
      <button id="stopBtn" class="btn btn-secondary" disabled>停止</button>
    </div>

    <div class="status">
      <div id="statusText">就绪</div>
      <div id="frameCount">已捕获帧数: 0 / --</div>
      <div id="progressBar" class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
